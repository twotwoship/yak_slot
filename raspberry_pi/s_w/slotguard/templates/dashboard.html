<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">
    <title>SLOT-GUARD</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>SLOT-GUARD</h1>

        <p class="notice">
            이 장치는 실제 복약 여부가 아니라
            정제의 배출구 통과 여부를 기록합니다.
        </p>

        <section class="status-grid">
            <div class="status-card">
                <strong>{{ counts.total }}</strong>
                <span>전체 일정</span>
            </div>

            <div class="status-card waiting">
                <strong>{{ counts.waiting }}</strong>
                <span>대기</span>
            </div>

            <div class="status-card allowed">
                <strong>{{ counts.allowed }}</strong>
                <span>복용 허용</span>
            </div>

            <div class="status-card dispensed">
                <strong>{{ counts.dispensed }}</strong>
                <span>정제 배출 확인</span>
            </div>

            <div class="status-card missed">
                <strong>{{ counts.missed }}</strong>
                <span>미배출</span>
            </div>
        </section>

        <a class="button" href="{{ url_for('schedule_page') }}">
            일정 등록 및 조회
        </a>
    </main>
</body>
</html>
